name: lint

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # allows the workflow to request an OIDC token for vault auth
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Modules
        run: |
          make mod
          git add . && git diff --staged --exit-code
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          go-version-file: 'go.mod'
          cache: true
