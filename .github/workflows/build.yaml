name: build

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"

env:
  REGISTRY: quay.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write # allows the workflow to request an OIDC token for vault auth
      contents: read
    steps:
      - name: Fetch Github Tokens
        id: fetch-github-tokens
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          path: github-jwt
          exportEnv: false
          role: github_uw_ro
          secrets: |
            /github/token/uw_ro token | GITHUB_UW_RO_TOKEN ;
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag with the source branch name (only on PRs)
            type=raw,value={{head_ref}},enable=${{ github.event_name == 'pull_request' }}
            # tag as 'latest' (only on pushes/merges to main)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
            # use git tag as image tag
            type=ref,event=tag
      - name: Login to Quay.io Container Registry
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: utilitywarehouse+drone_ci
          password: ${{ secrets.SYSTEM_QUAY_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            github_token=${{ steps.fetch-github-tokens.outputs.GITHUB_UW_RO_TOKEN }}
          build-args: |
            GITHUB_USER="-"
            GIT_SHA=${{github.sha}}

      - name: Revoke token
        if: always() # always runs at the end regardless of the previous steps result
        run: |
          curl -sSL -H "Authorization: Bearer ${GITHUB_UW_RO_TOKEN}" -X DELETE https://api.github.com/installation/token
        env:
          GITHUB_UW_RO_TOKEN: ${{ steps.fetch-github-tokens.outputs.GITHUB_UW_RO_TOKEN }}
