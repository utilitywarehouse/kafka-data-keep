name: build

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

env:
  REGISTRY: quay.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write # allows the workflow to request an OIDC token for vault auth
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # type=ref,event=branch: tags with the branch name on branch push events (e.g. "main")
          # type=semver: extracts semver from tag pushes (e.g. v1.2.3 -> "1.2.3" and "1.2")
          # type=raw,value=head_ref: tags with the PR source branch name on pull_request events
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}
      - name: Login to Quay.io Container Registry
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: utilitywarehouse+drone_ci
          password: ${{ secrets.SYSTEM_QUAY_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_USER="-"
            GIT_SHA=${{github.sha}}
