name: build

on:
  push:
    tags:
      - "v*"
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

env:
  REGISTRY: quay.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      id-token: write # allows the workflow to request an OIDC token for vault auth
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # type=ref,event=branch: tags with the branch name on branch push events (e.g. "main")
          # type=semver: extracts semver from tag pushes (e.g. v1.2.3 -> "1.2.3" and "1.2")
          # type=raw,value=head_ref: tags with the PR source branch name on pull_request events
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ github.head_ref }},enable=${{ github.event_name == 'pull_request' }}
      - name: Login to Quay.io Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: quay.io
          username: utilitywarehouse+drone_ci
          password: ${{ secrets.SYSTEM_QUAY_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_USER="-"
            GIT_SHA=${{github.sha}}
