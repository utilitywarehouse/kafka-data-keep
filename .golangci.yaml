version: "2"
run:
  tests: true
  allow-parallel-runners: true
linters:
  default: all
  disable:
    # Too strict style/complexity linters
    - cyclop
    - depguard
    - err113
    - exhaustruct
    - funcorder
    - funlen
    - gochecknoglobals
    - gocognit
    - godot
    - ireturn
    - lll
    - maintidx
    - mnd
    - nestif
    - nilnil
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - perfsprint
    - testpackage
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    revive:
      rules:
        - name: error-return
          disabled: true
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - contextcheck
          - sloglint
        path: main.go$
      - linters:
          - contextcheck
          - errcheck
          - gochecknoinits
          - revive
          - sloglint
          - spancheck
        path: _test.go$
