version: "2"
run:
  tests: true
  allow-parallel-runners: true

# Enable formatters explicitly. None is enabled by default
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports

linters:
  # Enable specific linters in addition to defaults
  enable:
     # Core Safety & Correctness
    - nilerr
    - noctx

    # Style & Consistency
    - misspell
    - revive      # Replacement for golint
    - errorlint   # Go 1.13+ error wrapping support
    - prealloc
    - gocritic

    # Complexity & Code Quality
    - gocognit # Cognitive complexity is often better than Cyclomatic

    # Security
    - gosec

    # Testing & Concurrency
    - testifylint
    - tparallel

  settings:
    revive:
      enable-default-rules: true
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
