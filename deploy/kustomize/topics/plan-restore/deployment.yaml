apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-topics-plan-restore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-topics-plan-restore
  labels:
    app: kafka-topics-plan-restore
    app.kubernetes.io/name: kafka-topics-plan-restore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-topics-plan-restore
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /__/metrics
        prometheus.io/port: "8081"
      labels:
        app: kafka-topics-plan-restore
        app.kubernetes.io/name: kafka-topics-plan-restore
    spec:
      serviceAccountName: kafka-topics-plan-restore
      containers:
        - name: kafka-topics-plan-restore
          image: quay.io/utilitywarehouse/kafka-data-keep:main
          imagePullPolicy: IfNotPresent
          command: ["/kafka-data-keep", "topics-plan-restore"]
          resources:
            requests:
              cpu: 0
              memory: 0
            limits:
              cpu: 4
              memory: 1Gi
          env:
            - name: KAFKA_BROKERS
              value: TBD
            # Convenient way of passing the seed brokers in a single DNS SRV record with the service name being "kafka"
            - name: KAFKA_BROKERS_DNS_SRV
              value: ""
            - name: KAFKA_MTLS_AUTH
              value: "false"
            - name: KAFKA_MTLS_CA_CERT_PATH
              value: /certs/ca.crt
            - name: KAFKA_MTLS_CLIENT_CERT_PATH
              value: /certs/tls.crt
            - name: KAFKA_MTLS_CLIENT_KEY_PATH
              value: /certs/tls.key
            - name: RESTORE_TOPICS_REGEX
              value: TBD
            - name: EXCLUDE_TOPICS_REGEX
              value: ""
            - name: PLAN_TOPIC
              value: TBD
            - name: S3_BUCKET
              value: TBD
            - name: S3_PREFIX
              value: kafka-backup
            - name: AWS_REGION
              value: TBD
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_FORMAT
              value: text
            - name: KGO_LOG_LEVEL
              value: WARN
            - name: METRICS_PORT
              value: "8081"
            - name: ENABLE_PPROF
              value: "false"
            - name: PPROF_PORT
              value: "6060"
            - name: PROCESS_LARGE_TOPICS_LAST
              value: "false"
            - name: LARGE_TOPIC_THRESHOLD_MB
              # This is the threshold for a topic to be considered large. Topics larger than this will be processed last if PROCESS_LARGE_TOPICS_LAST is set to true. Default 90GB
              value: "92160"
