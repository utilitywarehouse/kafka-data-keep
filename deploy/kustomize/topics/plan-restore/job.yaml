apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-topics-plan-restore
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-plan-restore
  labels:
    app: kafka-topics-plan-restore
    app.kubernetes.io/name: kafka-topics-plan-restore
spec:
  # plan-restore supports resuming, so we can keep the default backoff limit of 6 times.
  template:
    spec:
      serviceAccountName: kafka-topics-plan-restore
      restartPolicy: OnFailure
      containers:
        - name: kafka-topics-plan-restore
          image: quay.io/utilitywarehouse/kafka-data-keep:main
          imagePullPolicy: IfNotPresent
          command: ["/kafka-data-keep", "topics-plan-restore"]
          resources:
            requests:
              cpu: 0
              memory: 0
            limits:
              cpu: 4
              memory: 1Gi
          env:
            - name: KAFKA_BROKERS
              value: TBD
            # Convenient way of passing the seed brokers in a single DNS SRV record with the service name being "kafka"
            - name: KAFKA_BROKERS_DNS_SRV
              value: ""
            - name: KAFKA_MTLS_AUTH
              value: "false"
            - name: KAFKA_MTLS_CA_CERT_PATH
              value: /certs/ca.crt
            - name: KAFKA_MTLS_CLIENT_CERT_PATH
              value: /certs/tls.crt
            - name: KAFKA_MTLS_CLIENT_KEY_PATH
              value: /certs/tls.key
            - name: RESTORE_TOPICS_REGEX
              value: TBD
            - name: EXCLUDE_TOPICS_REGEX
              value: ""
            - name: PLAN_TOPIC
              value: TBD
            - name: S3_BUCKET
              value: TBD
            - name: S3_PREFIX
              value: kafka-backup
            - name: AWS_REGION
              value: TBD
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_FORMAT
              value: text
            - name: KGO_LOG_LEVEL
              value: INFO
            - name: METRICS_PORT
              value: "8081"
