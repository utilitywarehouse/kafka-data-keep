apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-topics-restore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-topics-restore
  labels:
    app: kafka-topics-restore
spec:
  replicas: 15
  selector:
    matchLabels:
      app: kafka-topics-restore
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /__/metrics
        prometheus.io/port: "8081"
      labels:
        app: kafka-topics-restore
    spec:
      serviceAccountName: kafka-topics-restore
      containers:
        - name: kafka-topics-restore
          image: quay.io/utilitywarehouse/kafka-data-keep:main
          imagePullPolicy: IfNotPresent
          command: ["/kafka-data-keep", "topics-restore"]
          env:
            - name: KAFKA_BROKERS
              value: TBD
            # Convenient way of passing the seed brokers in a single DNS SRV record with the service name being "kafka"
            - name: KAFKA_BROKERS_DNS_SRV
              value: ""
            - name: KAFKA_MTLS_AUTH
              value: "false"
            - name: KAFKA_MTLS_CA_CERT_PATH
              value: /certs/ca.crt
            - name: KAFKA_MTLS_CLIENT_CERT_PATH
              value: /certs/tls.crt
            - name: KAFKA_MTLS_CLIENT_KEY_PATH
              value: /certs/tls.key
            - name: KAFKA_PLAN_TOPIC
              value: pubsub.plan-topic-restore
            - name: KAFKA_GROUP_ID
              value: pubsub.kafka-topics-restore
            - name: KAFKA_RESTORE_TOPIC_PREFIX
              value: ""
            - name: S3_BUCKET
              value: TBD
            - name: AWS_REGION
              value: eu-west-1
            - name: LOG_LEVEL
              value: INFO
            - name: LOG_FORMAT
              value: text
            - name: KGO_LOG_LEVEL
              value: WARN
            - name: METRICS_PORT
              value: "8081"
            - name: ENABLE_PPROF
              value: "false"
            - name: PPROF_PORT
              value: "6060"
          resources:
            requests:
              cpu: "0"
              memory: "0"
            limits:
              cpu: "4"
              memory: 4Gi
